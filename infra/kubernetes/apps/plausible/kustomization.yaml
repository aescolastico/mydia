apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plausible

resources:
  - namespace.yaml
  - configmap.yaml
  - clickhouse-config.yaml
  - pvc.yaml
  - postgres-deployment.yaml
  - clickhouse-deployment.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # Note: secret.yaml must be created from secret.yaml.example
  # and applied separately, or let the deploy script create it

labels:
  - pairs:
      app.kubernetes.io/part-of: mydia
    includeSelectors: true

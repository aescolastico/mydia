apiVersion: apps/v1
kind: Deployment
metadata:
  name: plausible
  namespace: plausible
  labels:
    app.kubernetes.io/name: plausible
    app.kubernetes.io/component: analytics
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: plausible
      app.kubernetes.io/component: analytics
      app.kubernetes.io/part-of: mydia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plausible
        app.kubernetes.io/component: analytics
        app.kubernetes.io/part-of: mydia
    spec:
      initContainers:
        - name: plausible-init
          image: ghcr.io/plausible/community-edition:v3.2.0
          command:
            - /bin/sh
            - -c
            - /app/bin/migrate && /app/bin/migrate_clickhouse
          envFrom:
            - configMapRef:
                name: plausible-config
            - secretRef:
                name: plausible-secrets
      containers:
        - name: plausible
          image: ghcr.io/plausible/community-edition:v3.2.0
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plausible-config
            - secretRef:
                name: plausible-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

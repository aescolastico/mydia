apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: plausible
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
data:
  clickhouse-logs.xml: |
    <clickhouse>
      <logger>
        <level>warning</level>
        <console>true</console>
      </logger>
      <query_log remove="remove"/>
      <query_thread_log remove="remove"/>
      <query_views_log remove="remove"/>
      <part_log remove="remove"/>
      <metric_log remove="remove"/>
      <asynchronous_metric_log remove="remove"/>
      <session_log remove="remove"/>
      <text_log remove="remove"/>
      <trace_log remove="remove"/>
      <opentelemetry_span_log remove="remove"/>
    </clickhouse>

  clickhouse-ipv4-only.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
    </clickhouse>

  clickhouse-low-resources.xml: |
    <clickhouse>
      <max_server_memory_usage_to_ram_ratio>0.8</max_server_memory_usage_to_ram_ratio>
      <mark_cache_size>268435456</mark_cache_size>
      <uncompressed_cache_size>134217728</uncompressed_cache_size>
      <max_concurrent_queries>10</max_concurrent_queries>
      <background_pool_size>2</background_pool_size>
      <background_schedule_pool_size>2</background_schedule_pool_size>
      <merge_tree>
        <number_of_free_entries_in_pool_to_execute_mutation>0</number_of_free_entries_in_pool_to_execute_mutation>
        <number_of_free_entries_in_pool_to_lower_max_size_of_merge>0</number_of_free_entries_in_pool_to_lower_max_size_of_merge>
        <number_of_free_entries_in_pool_to_execute_optimize_entire_partition>0</number_of_free_entries_in_pool_to_execute_optimize_entire_partition>
      </merge_tree>
    </clickhouse>

  clickhouse-default-profile-low-resources-overrides.xml: |
    <clickhouse>
      <profiles>
        <default>
          <max_memory_usage>536870912</max_memory_usage>
          <max_threads>2</max_threads>
          <max_bytes_before_external_group_by>268435456</max_bytes_before_external_group_by>
        </default>
      </profiles>
    </clickhouse>

  clickhouse-retention.xml: |
    <clickhouse>
      <!-- Drop whole parts when TTL expires instead of row-by-row deletion -->
      <merge_tree>
        <ttl_only_drop_parts>1</ttl_only_drop_parts>
        <min_age_to_force_merge_seconds>86400</min_age_to_force_merge_seconds>
      </merge_tree>
      <!-- Reserve 512 MiB free space as safety margin -->
      <storage_configuration>
        <disks>
          <default>
            <keep_free_space_bytes>536870912</keep_free_space_bytes>
          </default>
        </disks>
      </storage_configuration>
    </clickhouse>

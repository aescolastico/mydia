# Certificate for TLS
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-tls
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
spec:
  dnsNames:
    - auth.mydia.dev
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: auth-tls-secret
---
# ForwardAuth middleware (referenced cross-namespace by protected apps)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
spec:
  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local:4180/
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
---
# Middleware for HTTP to HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP IngressRoute (redirects to HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy-http
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`auth.mydia.dev`)
      middlewares:
        - name: redirect-https
          namespace: oauth2-proxy
      services:
        - name: oauth2-proxy
          port: 4180
---
# HTTPS IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
  annotations:
    external-dns.alpha.kubernetes.io/target: 149.56.129.39
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`auth.mydia.dev`)
      services:
        - name: oauth2-proxy
          port: 4180
  tls:
    secretName: auth-tls-secret

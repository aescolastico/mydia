apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4180
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: authentication

name: Deploy / Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.0.0 or dev)'
        required: false
        default: 'dev'

permissions:
  contents: write

concurrency:
  group: "docs"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --project docs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch
        run: |
          git fetch origin gh-pages:gh-pages || echo "gh-pages branch does not exist yet"

      - name: Deploy dev (push to master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          uv run --project docs mike deploy --push --update-aliases dev

      - name: Deploy manual version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ "$VERSION" = "dev" ]; then
            uv run --project docs mike deploy --push --update-aliases dev
          else
            uv run --project docs mike delete --push latest || true
            uv run --project docs mike deploy --push --update-aliases "$VERSION" latest
            uv run --project docs mike set-default --push latest
          fi

name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  # ⚠️ KEEP IN SYNC — the Elixir/OTP/Rust toolchain for the test jobs now comes
  # from devenv.nix (the jobs run `devenv shell -- …`), so it is NOT duplicated
  # here anymore. Only Flutter is still pinned in two non-devenv places:
  #   - this var (FLUTTER_VERSION)        — used by the Flutter `test-player` job
  #   - .github/workflows/ci-player.yml   (FLUTTER_VERSION)
  #   - devenv.nix                        (flutter344 = 3.44.2)
  #   - Dockerfile                        (cirruslabs/flutter builder stage + the
  #                                         elixir:1.19-otp-28 prod base image)
  # Bump Flutter in all four together. Elixir/OTP/Rust are bumped once in
  # devenv.nix (plus the Dockerfile prod base) — CI follows automatically.
  FLUTTER_VERSION: "3.44.2"

# The three Elixir jobs below run their steps inside a single `devenv shell --
# bash` heredoc so the environment evaluates once and `_build` stays warm across
# steps (mirrors `./dev mix precommit`, dev:159-211). The toolchain (Elixir, OTP,
# Rust + wasm32-wasip2, Node, ffmpeg, chromium/chromedriver) comes from
# devenv.nix. GitHub sets CI=true, which makes devenv.nix skip its enterShell
# setup tasks (KTD7) — each job runs the equivalent setup (hex/rebar/deps/ecto)
# explicitly. The Nix/Cachix/devenv setup steps are duplicated across the three
# jobs; a composite action (U2) is a deferred DRY follow-up.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Reads devenv's public cache (pre-built common packages, no auth) plus the
      # project cache; pushes the project's own derivations only on same-repo
      # events, so fork PRs never receive or use the token (KTD1).
      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mydia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      # Pin the devenv CLI to the SAME nixpkgs the repo locks (KTD6); rev mirrors
      # devenv.lock's nixpkgs node — bump both together.
      - name: Install devenv
        run: nix profile install github:NixOS/nixpkgs/567a49d1913ce81ac6e9582e3553dd90a955875f#devenv

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-devenv-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-devenv-

      - name: Cache build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _build
          key: ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-

      - name: Test (SQLite) under devenv
        run: |
          devenv shell -- bash <<'DEVENV'
          set -euo pipefail
          export MIX_ENV=test
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix deps.get
          mix deps.unlock --check-unused
          mix compile --warnings-as-errors
          mix format --check-formatted
          # Guard against re-grandfathering: a Credo check must be enabled-and-
          # gating or `false`, never `exit_status: 0`. See CONTRIBUTING.md.
          if grep -n "exit_status: 0" .credo.exs; then
            echo "::error::exit_status: 0 found in .credo.exs - fix the finding or disable the check with false (see CONTRIBUTING.md)"
            exit 1
          fi
          mix credo --strict
          # Advisory dead-code report (non-blocking; see CONTRIBUTING.md "Quality gates").
          UNUSED_CHECK=true mix compile --force || true
          mix ecto.create
          mix ecto.migrate
          mix test --cover
          DEVENV

  test-postgres:
    name: Test / PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mydia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mydia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Install devenv
        run: nix profile install github:NixOS/nixpkgs/567a49d1913ce81ac6e9582e3553dd90a955875f#devenv

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-devenv-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-devenv-

      - name: Cache build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _build
          key: ${{ runner.os }}-build-devenv-postgres-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-devenv-postgres-${{ hashFiles('**/mix.lock') }}-

      # DATABASE_* is exported INSIDE the shell so it overrides devenv.nix's
      # per-worktree defaults (DATABASE_HOST/PORT/USER) and points at the GitHub
      # `services: postgres` container. DATABASE_TYPE is set here (not at job/eval
      # level) so the compile-time adapter is Postgres without devenv defining an
      # unused devenv-managed Postgres service at eval time (KTD4).
      - name: Test (PostgreSQL) under devenv
        run: |
          devenv shell -- bash <<'DEVENV'
          set -euo pipefail
          export MIX_ENV=test
          export DATABASE_TYPE=postgres
          export DATABASE_HOST=localhost
          export DATABASE_PORT=5432
          export DATABASE_USER=postgres
          export DATABASE_PASSWORD=postgres
          export DATABASE_NAME=mydia_test
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix deps.get
          mix compile
          mix ecto.create
          mix ecto.migrate
          mix ecto.migrations
          mix test --cover
          DEVENV

  test-player:
    name: Test / Player
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

  test-e2e:
    name: Test / E2E Browser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mydia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Install devenv
        run: nix profile install github:NixOS/nixpkgs/567a49d1913ce81ac6e9582e3553dd90a955875f#devenv

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-devenv-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-devenv-

      - name: Cache build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _build
          key: ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-

      # chromium + chromedriver come from devenv (devenv.nix sets CHROME_PATH /
      # CHROMEDRIVER_PATH); run-feature-tests.sh finds chromium on PATH and honors
      # CHROMEDRIVER_PATH, so no separate Chrome action is needed.
      - name: Feature tests (E2E) under devenv
        run: |
          devenv shell -- bash <<'DEVENV'
          set -euo pipefail
          export MIX_ENV=test
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix deps.get
          mix compile
          npm ci --prefix assets
          mix assets.deploy
          ./scripts/run-feature-tests.sh
          DEVENV

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wallaby-screenshots
          path: tmp/wallaby_screenshots/
          retention-days: 7

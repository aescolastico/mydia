name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  # ⚠️ KEEP IN SYNC across all toolchain sources — bump together:
  #   - these vars                      (ELIXIR_VERSION / OTP_VERSION / FLUTTER_VERSION)
  #   - devenv.nix                      (beam.packages.erlang_28 + rust 1.96.0 + flutter344)
  #   - .github/workflows/ci-player.yml (FLUTTER_VERSION)
  #   - Dockerfile                      (FROM elixir:1.19-otp-28 base + cirruslabs/flutter builder stage)
  # If they drift, local devenv and CI compile under different toolchains.
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "28"
  FLUTTER_VERSION: "3.44.2"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # The :plugins mix compiler builds the bundled WASM guests for wasm32
      # during `mix compile`. Provision the target explicitly rather than
      # assuming the runner's ambient toolchain is rustup-managed.
      #
      # PINNED to 1.96 to match devenv.nix (languages.rust, version 1.96.0).
      # The guest is a wasip2 component whose WASI
      # world version tracks the Rust toolchain (1.96 -> wasi 0.2.6). The host
      # is wasmex 0.14 / wasmtime 39, which only validates up to wasi 0.2.6;
      # a bleeding-edge `@stable` emits wasi 0.2.9 and the component fails to
      # instantiate ("incompatible plugin contract"). Bump this together with
      # the nix toolchain.
      - name: Setup Rust (wasm32 for plugin guests)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-wasip2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      # Guard against re-grandfathering: a Credo check must be enabled-and-
      # gating or `false`, never `exit_status: 0`. See CONTRIBUTING.md.
      - name: Forbid Credo grandfathering
        run: |
          if grep -n "exit_status: 0" .credo.exs; then
            echo "::error::exit_status: 0 found in .credo.exs - fix the finding or disable the check with false (see CONTRIBUTING.md)"
            exit 1
          fi

      - name: Run Credo
        run: mix credo --strict

      # Advisory by design, not grandfathering. mix_unused's export analysis
      # cannot trace framework dispatch (controller actions, HEEx components,
      # behaviour callbacks, runtime dispatch); rule-shaped ignores in mix.exs
      # cover the structural blind spots, and provably-dead code is deleted at
      # the source. The irreducible residual is intentional public API plus
      # default-argument arity artifacts, which cannot be driven to a principled
      # zero on a Phoenix app without deleting live code. So this step reports
      # for awareness but does not block. See CONTRIBUTING.md ("Quality gates").
      - name: Dead code report (advisory)
        run: UNUSED_CHECK=true mix compile --force
        continue-on-error: true

      - name: Setup database
        run: mix ecto.create && mix ecto.migrate

      - name: Run tests
        run: mix test --cover

  # ── U1 spike: devenv-in-CI (TEMPORARY A/B measurement job) ───────────────────
  # Runs the SAME SQLite checks as `test` above, but provisions the toolchain
  # from devenv.nix instead of setup-beam + dtolnay/rust-toolchain, so its
  # wall-clock can be compared against `test` on the same runner and commit.
  # Plan: docs/plans/2026-06-18-001-build-ci-devenv-migration-plan.md (U1).
  #   Gate: warm wall-clock within ~1.2x the `test` baseline -> go.
  #   On go, rollout (U2-U6) replaces `test` with this and deletes this job.
  #
  # ⚠️ SETUP REQUIRED before this job can cache the project's own derivations:
  #   1. Create a PUBLIC Cachix cache named `mydia` (cachix.org).
  #   2. Add a write-scoped CACHIX_AUTH_TOKEN as a repo (or environment) secret.
  # Without the token the job still runs read-only (pulls devenv's public cache);
  # it just won't populate the project cache, so the warm path won't be measured.
  test-devenv:
    name: Test / devenv (spike)
    runs-on: ubuntu-latest
    # Non-gating: this is a temporary measurement job, not a quality gate. It must
    # not fail the PR while devenv-in-CI is being proven (U1). The real gates are
    # the `test` / `test-postgres` / `test-e2e` jobs. Remove this flag (and this
    # job, replacing `test`) only after the spike is green and measured.
    continue-on-error: true
    # GitHub sets CI=true automatically; stated explicitly so devenv.nix's KTD7
    # guard (skip enterShell setup tasks) is obvious to a reader of this job.
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Reads devenv's public cache (pre-built common packages, no auth) plus the
      # project cache; pushes the project's own derivations only on same-repo
      # events, so fork PRs never receive or use the token (KTD1).
      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mydia
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv
          skipPush: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      # Pin the devenv CLI to the SAME nixpkgs the repo locks (KTD6) so the CLI
      # and the evaluated environment come from one nixpkgs — the unpinned
      # `nixpkgs#devenv` resolves against the runner's registry (a different rev)
      # and mismatches the lock. Rev mirrors devenv.lock's nixpkgs node; bump
      # both together.
      - name: Install devenv
        run: nix profile install github:NixOS/nixpkgs/567a49d1913ce81ac6e9582e3553dd90a955875f#devenv

      # Cache the Elixir build separately from the nix store so the warm path
      # exercises a warm _build too, isolating the measurement to toolchain
      # provisioning. Mirrors the `test` job's key shape (own `-devenv-` scope).
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-devenv-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-devenv-

      - name: Cache build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _build
          key: ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-devenv-${{ hashFiles('**/mix.lock') }}-

      # All steps run in ONE devenv shell so the environment evaluates once and
      # _build stays warm across steps (mirrors `./dev mix precommit`, dev:159-211).
      # CI=true makes devenv.nix skip its enterShell setup tasks (KTD7), so this
      # job runs the equivalent setup (hex/rebar/deps/ecto) explicitly. ffmpeg,
      # MIX_ENV, and the Rust/wasm32 toolchain come from devenv, not apt/actions.
      - name: Test under devenv
        run: |
          devenv shell -- bash <<'DEVENV'
          set -euo pipefail
          export MIX_ENV=test
          mix local.hex --force --if-missing
          mix local.rebar --force --if-missing
          mix deps.get
          mix deps.unlock --check-unused
          mix compile --warnings-as-errors
          mix format --check-formatted
          if grep -n "exit_status: 0" .credo.exs; then
            echo "::error::exit_status: 0 found in .credo.exs - fix the finding or disable the check with false (see CONTRIBUTING.md)"
            exit 1
          fi
          mix credo --strict
          # Advisory dead-code report (non-blocking, mirrors the `test` job).
          UNUSED_CHECK=true mix compile --force || true
          mix ecto.create
          mix ecto.migrate
          mix test --cover
          DEVENV

  test-postgres:
    name: Test / PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mydia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_TYPE: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: mydia_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # The :plugins mix compiler builds the bundled WASM guests for wasm32
      # during `mix compile`. Provision the target explicitly rather than
      # assuming the runner's ambient toolchain is rustup-managed.
      #
      # PINNED to 1.96 to match devenv.nix (languages.rust, version 1.96.0).
      # The guest is a wasip2 component whose WASI
      # world version tracks the Rust toolchain (1.96 -> wasi 0.2.6). The host
      # is wasmex 0.14 / wasmtime 39, which only validates up to wasi 0.2.6;
      # a bleeding-edge `@stable` emits wasi 0.2.9 and the component fails to
      # instantiate ("incompatible plugin contract"). Bump this together with
      # the nix toolchain.
      - name: Setup Rust (wasm32 for plugin guests)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-wasip2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-postgres-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-postgres-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-postgres-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}-${{ hashFiles('lib/**/*.ex', 'test/**/*.exs') }}
          restore-keys: |
            ${{ runner.os }}-build-postgres-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Create database
        run: mix ecto.create

      - name: Run migrations
        run: mix ecto.migrate

      - name: Verify migrations
        run: mix ecto.migrations

      - name: Run tests
        run: mix test --cover

  test-player:
    name: Test / Player
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: player

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

  test-e2e:
    name: Test / E2E Browser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # The :plugins mix compiler builds the bundled WASM guests for wasm32
      # during `mix compile`. Provision the target explicitly rather than
      # assuming the runner's ambient toolchain is rustup-managed.
      #
      # PINNED to 1.96 to match devenv.nix (languages.rust, version 1.96.0).
      # The guest is a wasip2 component whose WASI
      # world version tracks the Rust toolchain (1.96 -> wasi 0.2.6). The host
      # is wasmex 0.14 / wasmtime 39, which only validates up to wasi 0.2.6;
      # a bleeding-edge `@stable` emits wasi 0.2.9 and the component fails to
      # instantiate ("incompatible plugin contract"). Bump this together with
      # the nix toolchain.
      - name: Setup Rust (wasm32 for plugin guests)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-wasip2

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Install Node.js dependencies
        run: npm ci --prefix assets

      - name: Build assets
        run: mix assets.deploy
        env:
          MIX_ENV: test

      - name: Run feature tests
        run: ./scripts/run-feature-tests.sh

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wallaby-screenshots
          path: tmp/wallaby_screenshots/
          retention-days: 7
